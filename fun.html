<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1% Precision Trash Volume</title>
    <style>
        body {
            margin: 0; background: #fff; color: #000;
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #ui { 
            position: absolute; top: 40px; text-align: center; 
            pointer-events: none; width: 100%;
        }
        #meter-container { 
            width: 300px; height: 2px; background: #eee; 
            margin: 15px auto; position: relative;
        }
        #meter-fill { height: 100%; background: #000; width: 50%; }
        #vol-label { font-size: 24px; font-weight: bold; }
        canvas { cursor: crosshair; }
        #start-prompt {
            position: absolute; inset: 0; background: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; cursor: pointer; text-decoration: underline;
        }
        .instruction { font-size: 10px; margin-top: 10px; opacity: 0.6; }
    </style>
</head>
